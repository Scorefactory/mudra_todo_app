<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>16-bit Chameleon Loading</title>
  <style>
    :root {
      --bg: #101114;
      --screen: #101114;
      --green-1: #76e060;
      --green-2: #3bae48;
      --green-3: #1f6b32;
      --lime: #c6f66f;
      --pink-1: #ff7aa8;
      --pink-2: #d53f73;
      --white: #f4f4d7;
      --black: #151515;
      --wood-1: #8a5a2c;
      --wood-2: #4b2d1c;
      --text: #cbd5e1;
      --pixel: 7px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      font-family: "Malgun Gothic", "Segoe UI", sans-serif;
      image-rendering: pixelated;
    }

    .stage {
      width: 460px;
      height: 260px;
      display: grid;
      place-items: center;
      background: transparent;
      overflow: visible;
      image-rendering: pixelated;
    }

    .loader {
      position: relative;
      width: 385px;
      height: 168px;
      transform: translateY(8px);
    }

    .px {
      position: absolute;
      width: var(--pixel);
      height: var(--pixel);
      background: currentColor;
      box-shadow: var(--shadow);
    }

    .branch {
      position: absolute;
      left: 112px;
      top: 118px;
      width: 126px;
      height: 8px;
      background: var(--wood-1);
      box-shadow:
        0 5px 0 var(--wood-2),
        24px -5px 0 var(--wood-2),
        70px 5px 0 var(--wood-2);
    }

    .chameleon {
      position: absolute;
      left: 65px;
      top: 51px;
      width: 231px;
      height: 84px;
      animation: sprite-hop 3s steps(2, end) infinite;
    }

    .body {
      color: var(--green-2);
      --shadow:
        7px 0 var(--green-2),
        14px 0 var(--green-1),
        21px 0 var(--green-1),
        28px 0 var(--green-1),
        35px 0 var(--green-1),
        42px 0 var(--green-2),
        49px 0 var(--green-2),
        56px 0 var(--green-2),
        63px 0 var(--green-3),
        70px 0 var(--green-3),

        -7px 7px var(--green-2),
        0 7px var(--green-1),
        7px 7px var(--green-1),
        14px 7px var(--green-1),
        21px 7px var(--lime),
        28px 7px var(--green-1),
        35px 7px var(--green-2),
        42px 7px var(--green-1),
        49px 7px var(--green-2),
        56px 7px var(--green-2),
        63px 7px var(--green-3),
        70px 7px var(--green-3),
        77px 7px var(--green-3),

        -7px 14px var(--green-3),
        0 14px var(--green-2),
        7px 14px var(--green-1),
        14px 14px var(--lime),
        21px 14px var(--lime),
        28px 14px var(--lime),
        35px 14px var(--green-1),
        42px 14px var(--green-2),
        49px 14px var(--green-2),
        56px 14px var(--green-2),
        63px 14px var(--green-3),
        70px 14px var(--green-3),
        77px 14px var(--green-3),

        0 21px var(--green-3),
        7px 21px var(--green-2),
        14px 21px var(--green-1),
        21px 21px var(--green-1),
        28px 21px var(--lime),
        35px 21px var(--green-1),
        42px 21px var(--green-2),
        49px 21px var(--green-2),
        56px 21px var(--green-3),
        63px 21px var(--green-3),
        70px 21px var(--green-3),

        14px 28px var(--green-3),
        21px 28px var(--green-2),
        28px 28px var(--green-2),
        35px 28px var(--green-2),
        42px 28px var(--green-3),
        49px 28px var(--green-3);
      left: 70px;
      top: 25px;
    }

    .head {
      color: var(--green-1);
      --shadow:
        7px 0 var(--green-1),
        14px 0 var(--green-2),
        21px 0 var(--green-2),
        28px 0 var(--green-3),

        0 7px var(--green-1),
        7px 7px var(--green-1),
        14px 7px var(--green-2),
        21px 7px var(--green-2),
        28px 7px var(--green-2),
        35px 7px var(--green-3),

        0 14px var(--green-2),
        7px 14px var(--green-2),
        14px 14px var(--green-2),
        21px 14px var(--green-3),
        28px 14px var(--green-3),
        35px 14px var(--green-3),
        42px 14px var(--green-3),

        7px 21px var(--green-3),
        14px 21px var(--green-3),
        21px 21px var(--green-3),
        28px 21px var(--green-3);
      left: 147px;
      top: 18px;
    }

    .eye {
      color: var(--white);
      --shadow:
        7px 0 var(--white),
        0 7px var(--white),
        7px 7px var(--black);
      left: 161px;
      top: 4px;
      animation: eye-step 3s steps(1, end) infinite;
    }

    .mouth {
      color: var(--black);
      --shadow:
        7px 0 var(--black),
        14px 0 var(--black);
      left: 189px;
      top: 39px;
      z-index: 3;
    }

    .tail {
      color: var(--green-3);
      --shadow:
        7px 0 var(--green-3),
        14px 0 var(--green-2),
        21px 0 var(--green-2),
        21px 7px var(--green-2),
        21px 14px var(--green-2),
        14px 14px var(--green-2),
        7px 14px var(--green-3),
        0 14px var(--green-3),
        -7px 14px var(--green-3),
        -14px 14px var(--green-3),
        -14px 7px var(--green-3),
        -7px 7px var(--screen),
        0 7px var(--screen),
        7px 7px var(--screen);
      left: 33px;
      top: 39px;
    }

    .leg-a {
      color: var(--green-3);
      --shadow:
        0 7px var(--green-3),
        0 14px var(--green-3),
        7px 14px var(--green-3),
        14px 14px var(--green-3);
      left: 84px;
      top: 63px;
    }

    .leg-b {
      color: var(--green-3);
      --shadow:
        0 7px var(--green-3),
        0 14px var(--green-3),
        7px 14px var(--green-3),
        14px 14px var(--green-3);
      left: 138px;
      top: 63px;
    }

    .tongue {
      position: absolute;
      left: 262px;
      top: 89px;
      width: 112px;
      height: 7px;
      transform-origin: left center;
      transform: scaleX(0);
      background: repeating-linear-gradient(
        90deg,
        var(--pink-2) 0,
        var(--pink-2) 7px,
        var(--pink-1) 7px,
        var(--pink-1) 14px
      );
      image-rendering: pixelated;
      animation: tongue-pixel 3s steps(6, end) infinite;
      z-index: 1;
    }

    .tongue::after {
      content: "";
      position: absolute;
      right: -7px;
      top: -7px;
      width: 14px;
      height: 21px;
      background:
        linear-gradient(var(--pink-1), var(--pink-1)) 0 7px / 14px 7px no-repeat,
        linear-gradient(var(--pink-1), var(--pink-1)) 7px 0 / 7px 21px no-repeat;
      opacity: 0;
      animation: tongue-tip 3s steps(1, end) infinite;
    }

    .shadow {
      position: absolute;
      left: 110px;
      top: 135px;
      width: 161px;
      height: 7px;
      background: rgba(0, 0, 0, 0.34);
      animation: shadow-step 3s steps(2, end) infinite;
    }

    @keyframes tongue-pixel {
      0%, 14%, 100% {
        transform: scaleX(0);
      }

      34%, 68% {
        transform: scaleX(1);
      }
    }

    @keyframes tongue-tip {
      0%, 14%, 100% {
        opacity: 0;
      }

      34%, 68% {
        opacity: 1;
      }
    }

    @keyframes sprite-hop {
      0%, 100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-7px);
      }
    }

    @keyframes eye-step {
      0%, 24%, 100% {
        transform: translateX(0);
      }

      40%, 68% {
        transform: translateX(7px);
      }
    }

    @keyframes shadow-step {
      0%, 100% {
        transform: scaleX(1);
        opacity: 0.34;
      }

      50% {
        transform: scaleX(0.86);
        opacity: 0.22;
      }
    }

    @media (max-width: 520px) {
      .stage {
        transform: scale(0.86);
      }
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="16비트 가로 카멜레온 로딩 애니메이션 시안">
    <section class="loader">
      <div class="branch"></div>
      <div class="shadow"></div>
      <div class="tongue"></div>
      <div class="chameleon">
        <span class="px tail"></span>
        <span class="px body"></span>
        <span class="px head"></span>
        <span class="px eye"></span>
        <span class="px mouth"></span>
        <span class="px leg-a"></span>
        <span class="px leg-b"></span>
      </div>
    </section>
  </main>
</body>
</html>
